# Axolotl SFT Config für Intelligence Booster (Reasoning/CoT)
# Wird auf das abliterierte Modell angewendet BEVOR ORPO läuft.
base_model: ./abliteration/abliterated_model
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

flash_attention: true

load_in_8bit: false
load_in_4bit: false
strict: false

datasets:
  - path: ./finetuning/openorca_mapped.jsonl
    ds_type: json
    type: alpaca

val_set_size: 0.01
output_dir: ./sft_output

sequence_len: 4096
sample_packing: true
pad_to_sequence_len: true

adapter: lora
lora_model_dir:
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 1
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 2e-5
train_on_inputs: false
group_by_length: false

bf16: true
fp16: false
tf32: true

gradient_checkpointing: true
logging_steps: 10
warmup_steps: 50
save_steps: 500

wandb_project:
wandb_run_id:
wandb_mode: disabled
