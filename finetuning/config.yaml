# Axolotl ORPO Config für 4B Uncensoring-Healing
base_model: ./abliteration/abliterated_model   # Output aus Heretic Phase 1
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

# Chat-Template wird automatisch aus dem Tokenizer des Modells gelesen.
# Nicht manuell setzen, da Qwen3.5 ein eigenes Jinja2-Template hat.
flash_attention: true

load_in_8bit: false
load_in_4bit: false                 # Native BF16 for maximum quality
strict: false

datasets:
  - path: mlabonne/orpo-dpo-mix-40k
    type: chat_template.argilla    # Nutzt das native Chat-Template des Modells
    field_chosen: chosen           # chosen-Spalte: Liste von {role, content}-Dicts
    field_rejected: rejected       # rejected-Spalte: Liste von {role, content}-Dicts

val_set_size: 0.01
output_dir: ./orpo_output

sequence_len: 4096
sample_packing: false
pad_to_sequence_len: true

adapter: lora
lora_model_dir:
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ORPO-spezifisch (kein Referenzmodell nötig, spart VRAM)
rl: orpo
orpo_alpha: 0.1

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 1
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 5e-5
train_on_inputs: false
group_by_length: false

bf16: true
fp16: false
tf32: true

gradient_checkpointing: true
early_stopping_patience:
resume_from_checkpoint:
logging_steps: 10
warmup_steps: 50
eval_steps: 200
save_steps: 500

# Wandb optional
wandb_project:
wandb_run_id:
wandb_mode: disabled
